<!DOCTYPE html>
<html>
<head>
    <title>AI Digit Recognizer</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #2c3e50);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        canvas {
            border: 2px solid white;
            border-radius: 10px;
            background: black;
            cursor: crosshair;
        }

        .panel {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .predict {
            background: #00c9a7;
            color: white;
        }

        .clear {
            background: #ff4d4d;
            color: white;
        }

        .bar {
            height: 18px;
            margin: 4px 0;
            background: #444;
            border-radius: 5px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            background: #00c9a7;
            width: 0%;
        }
    </style>
</head>

<body>

<h1>🤖 AI Digit Recognizer</h1>

<div class="container">

    <!-- Canvas -->
    <div>
        <canvas id="canvas" width="280" height="280"></canvas><br>
        <button class="clear" onclick="clearCanvas()">Clear</button>
        <button class="predict" onclick="predict()">Predict</button>
    </div>

    <!-- Results -->
    <div class="panel">
        <h2 id="result">Prediction: -</h2>
        <h3 id="confidence">Confidence: -</h3>

        <h4>Probabilities</h4>
        <div id="bars"></div>
    </div>

</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

ctx.fillStyle = "black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e){
    if(!drawing) return;

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(e.offsetX, e.offsetY, 10, 0, Math.PI*2);
    ctx.fill();
}

function clearCanvas(){
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function createBars(probs){
    let barsDiv = document.getElementById("bars");
    barsDiv.innerHTML = "";

    for(let i=0;i<10;i++){
        let container = document.createElement("div");

        let label = document.createElement("div");
        label.innerText = i;

        let bar = document.createElement("div");
        bar.className = "bar";

        let fill = document.createElement("div");
        fill.className = "fill";
        fill.style.width = (probs[i]*100) + "%";

        bar.appendChild(fill);
        container.appendChild(label);
        container.appendChild(bar);

        barsDiv.appendChild(container);
    }
}

function predict(){
    let image = canvas.toDataURL("image/png");

    fetch("/predict", {
        method: "POST",
        body: JSON.stringify({image:image}),
        headers: {"Content-Type":"application/json"}
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = "Prediction: " + data.prediction;
        document.getElementById("confidence").innerText = "Confidence: " + (data.confidence*100).toFixed(2) + "%";

        createBars(data.probabilities);
    });
}
</script>

</body>
</html>
